name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Valores dummy: el build no necesita servicios reales.
          DATABASE_URL: postgres://user:pass@localhost:5432/vibefitai
          AUTH_SECRET: ci-dummy-secret
          NEXT_PUBLIC_APP_URL: http://localhost:3000
